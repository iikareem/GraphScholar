services:
  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"   # Neo4j Browser (HTTP)
      - "7687:7687"   # Bolt protocol (app driver connects here)
    environment:
      # Format must be username/password — reads password from project .env
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
    volumes:
      - neo4j_data:/data

volumes:
  neo4j_data:
